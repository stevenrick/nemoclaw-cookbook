# Claude Code policy additions — auth, download, and API endpoints
# Upstream provides api.anthropic.com with restrictive REST rules (POST /v1/messages only),
# but Claude Code also hits /api/hello, /api/organizations, etc. for auth/session flows.
# We add api.anthropic.com with access: full to use a CONNECT tunnel instead,
# plus auth endpoints, download endpoints, and github binary access.

add_endpoints:
  claude_code:
    - host: api.anthropic.com
      port: 443
      access: full
    - host: platform.claude.com
      port: 443
      access: full
    - host: downloads.claude.ai
      port: 443
      access: full
    - host: raw.githubusercontent.com
      port: 443
      access: full
    - host: storage.googleapis.com
      port: 443
      access: full

# Note: claude binary access for github_codeload is defined in policy-core.yaml
# (new_sections must include all binaries since add_binaries runs first)
