# Tavily web search API access.
#
# Upstream only ships Brave as a first-class web-search provider. Remove this
# fragment when upstream adds a `tavily` policy preset. See UPSTREAM.md for
# the full inventory of cookbook scaffolds and their removal conditions.
new_sections:
  tavily:
    name: tavily
    endpoints:
      - host: api.tavily.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
