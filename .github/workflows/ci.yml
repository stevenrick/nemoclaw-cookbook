name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-patches:
    name: Validate patches against upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: ./scripts/validate-patches.sh

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: shellcheck setup.sh scripts/*.sh

  docker-build:
    name: Build patched sandbox image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Clone upstream NemoClaw
        run: git clone --depth 1 https://github.com/NVIDIA/NemoClaw /tmp/NemoClaw
      - name: Apply cookbook patches
        run: |
          pip3 install --quiet 'pyyaml>=6,<7'
          INSTALL_CLAUDE_CODE=true INSTALL_CODEX=true ./scripts/apply-patches.sh /tmp/NemoClaw
      - name: Build Docker image
        run: docker build --tag nemoclaw-cookbook-test:ci /tmp/NemoClaw
