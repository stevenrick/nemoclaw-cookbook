name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 12 * * 1" # weekly Monday at 12:30 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: github/codeql-action/init@0e9f55954318745b37b7933c693bc093f7336125 # v4.35.1
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@0e9f55954318745b37b7933c693bc093f7336125 # v4.35.1
