# Nginx reverse proxy for NemoClaw on Brev.
# Binds to 127.0.0.1 only — cloudflared tunnel is the sole external access.
#
# Routing:
#   /terminal     → Static xterm.js terminal page
#   /ws/terminal  → Terminal WebSocket server (port 3001) if enabled
#   /*            → OpenClaw dashboard (port 18789)
#
# The Origin rewrite is the key: the browser sends the cloudflared FQDN origin,
# but the sandbox CORS config only allows 127.0.0.1:18789. Rewriting Origin at
# the proxy layer solves this without patching the sandbox config (which is
# Landlock read-only and integrity-hashed).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 127.0.0.1:80 default_server;

    # Terminal page — static HTML with xterm.js
    location = /terminal {
        alias /home/ubuntu/nemoclaw-cookbook/terminal-server/terminal.html;
        default_type text/html;
    }

    # Terminal WebSocket server (port 3001)
    location /ws/terminal {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # OpenClaw dashboard — all other requests
    location / {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;

        # WebSocket support for OpenClaw dashboard
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite Origin to match the gateway's allowedOrigins list.
        # The browser sends the cloudflared FQDN origin (e.g. https://xxx.brevlab.com)
        # which isn't in allowedOrigins. Since nginx is on localhost and all
        # external access is authenticated via cloudflared tunnel, this is safe.
        proxy_set_header Origin http://127.0.0.1:18789;

        # Long timeouts for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time data
        proxy_buffering off;
        proxy_cache off;
    }
}
